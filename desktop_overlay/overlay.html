<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AURA Overlay</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="overlay.css">
</head>
<body>
  <div id="aura-overlay-bubble" class="aura-overlay-bubble" title="Open AURA">
    <div class="overlay-bubble-core"></div>
  </div>
  <div id="aura-overlay-panel" class="aura-overlay-panel">
    <div class="overlay-panel-header">
      <span class="overlay-status-dot"></span>
      <span>AURA Overlay</span>
      <select id="overlay-assistant-mode" class="overlay-mode-select" title="Assistant mode">
        <option value="quick">Quick</option>
        <option value="tutor">Tutor</option>
        <option value="copilot" selected>Copilot</option>
        <option value="focus">Focus</option>
        <option value="research">Research</option>
      </select>
      <button id="overlay-close-btn" type="button" aria-label="Close">&times;</button>
    </div>
    <div id="overlay-context-label" class="overlay-context-label">Detecting active app…</div>
    <div id="overlay-chat-messages" class="overlay-panel-body">
      <div class="overlay-system-msg">Ask about your screen or current app. Enter to send.</div>
    </div>
    <div class="overlay-panel-input">
      <button id="overlay-scan-btn" type="button" class="overlay-scan-btn" title="Capture screen context">
        <i class="fa-solid fa-camera"></i>
      </button>
      <textarea id="overlay-user-input" placeholder="Ask AURA…" rows="2" autocomplete="off"></textarea>
      <button id="overlay-send-btn" type="button" aria-label="Send">
        <i class="fa-solid fa-paper-plane"></i>
      </button>
    </div>
  </div>
  <script src="overlay-client.js"></script>
  <script src="overlay-runtime.js"></script>
</body>
</html>
