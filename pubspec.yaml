name: ai_chatbot
description: "A new Flutter project."
publish_to: 'none'

version: 1.3.0+3

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  socket_io_client: ^3.0.0
  http: ^1.2.1
  shared_preferences: ^2.2.2
  google_sign_in: ^6.2.1
  flutter_highlight: ^0.7.0
  flutter_markdown: ^0.7.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/aura_logo.png
    - assets/neural_core.png

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/aura_logo.png"
  min_sdk_android: 21
